# Deploys static `out/` to Cloudflare Pages (bypasses OpenNext / Worker preset).
name: Deploy static site to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Verify Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            echo "Add it: Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Use a Cloudflare API token with Account → Cloudflare Pages → Edit"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            echo "Find it: Cloudflare dashboard → Workers & Pages → Account ID (sidebar)"
            exit 1
          fi

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=buildify-website
